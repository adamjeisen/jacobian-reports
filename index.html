<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JacobianODE — Sweep Reports</title>
<style>
  :root {
    --bg: #0d1117; --fg: #c9d1d9; --fg2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --border: #30363d;
    --card: #161b22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
         background: var(--bg); color: var(--fg); line-height: 1.6;
         padding: 2rem; max-width: 1200px; margin: 0 auto; }
  h1 { color: var(--accent); margin-bottom: 0.5rem; font-size: 1.4rem; }
  h2 { color: var(--fg); margin: 2rem 0 0.8rem; font-size: 1.1rem;
       border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  .subtitle { color: var(--fg2); font-size: 0.85rem; margin-bottom: 1.5rem; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Auth gate */
  #auth-gate { text-align: center; margin-top: 20vh; }
  #auth-gate input { background: var(--card); border: 1px solid var(--border);
    color: var(--fg); padding: 0.5rem 1rem; font-family: inherit;
    font-size: 1rem; border-radius: 4px; width: 250px; }
  #auth-gate button { background: var(--accent); color: var(--bg);
    border: none; padding: 0.5rem 1.2rem; font-family: inherit;
    font-size: 0.9rem; border-radius: 4px; cursor: pointer; margin-left: 0.5rem; }
  #auth-gate .error { color: var(--red); margin-top: 0.5rem; font-size: 0.85rem; }

  /* Dashboard */
  #dashboard { display: none; }
  .status-bar { display: flex; gap: 1.5rem; flex-wrap: wrap;
    margin-bottom: 1.5rem; font-size: 0.85rem; }
  .status-bar .stat { background: var(--card); padding: 0.5rem 1rem;
    border-radius: 6px; border: 1px solid var(--border); }
  .stat .num { font-size: 1.3rem; font-weight: bold; }

  /* Project cards */
  .project { margin-bottom: 1.5rem; }
  .project-name { font-size: 0.95rem; color: var(--fg2); margin-bottom: 0.4rem; }
  .sweep-list { display: grid; gap: 0.5rem; }
  /* Stats/meta always on second line: stack group-name over meta
     regardless of viewport width. Prevents layout jitter where long
     names push meta to a new line and short ones keep it inline. */
  .sweep-card { background: var(--card); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 1rem; display: flex;
    flex-direction: column; align-items: stretch; gap: 0.4rem; }
  .sweep-card:hover { border-color: var(--accent); }
  .sweep-name-row { display: flex; justify-content: space-between;
    align-items: baseline; gap: 0.5rem; }
  .sweep-name { font-size: 0.85rem; overflow-wrap: anywhere;
    word-break: break-word; flex: 1 1 auto; }
  .sweep-meta { display: flex; gap: 0.8rem; align-items: center;
    flex-wrap: wrap; font-size: 0.78rem; color: var(--fg2); }
  .hide-btn { background: none; border: none; color: var(--fg2);
    font-family: inherit; font-size: 0.75rem; cursor: pointer;
    padding: 0 0.3rem; opacity: 0.4; transition: opacity 0.15s; }
  .hide-btn:hover { opacity: 1; color: var(--fg); }

  /* Hidden-groups dropdown inside each project */
  .hidden-details { margin-top: 0.4rem; font-size: 0.8rem; }
  .hidden-details > summary { color: var(--fg2); cursor: pointer;
    padding: 0.3rem 0; list-style: none; user-select: none; }
  .hidden-details > summary::before { content: "▸ "; }
  .hidden-details[open] > summary::before { content: "▾ "; }
  .hidden-details .sweep-list { margin-top: 0.4rem; opacity: 0.75; }

  /* Mobile / narrow viewport */
  @media (max-width: 640px) {
    body { padding: 1rem; }
    h1 { font-size: 1.2rem; }
    h2 { font-size: 1rem; margin: 1.5rem 0 0.6rem; }
    .status-bar { gap: 0.6rem; }
    .status-bar .stat { padding: 0.4rem 0.7rem; font-size: 0.8rem; }
    .stat .num { font-size: 1.1rem; }
    .sweep-card { padding: 0.7rem 0.8rem; }
    .sweep-meta { width: 100%; gap: 0.5rem 0.8rem; }
  }

  /* Badges */
  .badge { padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem;
    font-weight: 600; text-transform: uppercase; }
  .badge-active { background: #d2992233; color: var(--yellow); }
  .badge-processed { background: #3fb95033; color: var(--green); }
  .badge-done { background: #58a6ff33; color: var(--accent); }
  .badge-failed { background: #f8514933; color: var(--red); }

  .refresh-note { color: var(--fg2); font-size: 0.75rem; margin-top: 2rem;
    text-align: center; }

  /* Pull-to-refresh indicator */
  html, body { overscroll-behavior-y: contain; }
  #pull-indicator { position: fixed; top: 0; left: 0; right: 0;
    height: 50px; display: flex; align-items: center; justify-content: center;
    background: var(--card); border-bottom: 1px solid var(--border);
    color: var(--fg2); font-size: 0.85rem; z-index: 1000;
    transform: translateY(-100%); pointer-events: none;
    transition: transform 0.2s ease-out; }
  #pull-indicator.refreshing { color: var(--accent); }

  /* Instructions queue */
  .queue-item { font-size: 0.82rem; padding: 0.4rem 0;
    border-bottom: 1px solid var(--border); }
  .queue-item:last-child { border: none; }
  .empty { color: var(--fg2); font-style: italic; font-size: 0.85rem; }

  /* Diagnostics browser */
  .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 1rem; }
  .toolbar button { background: var(--card); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 0.4rem 0.8rem; font-family: inherit; font-size: 0.85rem;
    cursor: pointer; }
  .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  #diag-modal { display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 2000;
    overflow-y: auto; padding: 2rem; }
  #diag-modal.open { display: block; }
  .diag-modal-inner { max-width: 1100px; margin: 0 auto;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 1.5rem; }
  .diag-modal-header { display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 1rem; }
  .diag-modal-header h3 { color: var(--accent); font-size: 1rem;
    font-weight: normal; }
  .diag-close { background: none; border: none; color: var(--fg);
    font-size: 1.2rem; cursor: pointer; padding: 0 0.5rem; }
  .diag-close:hover { color: var(--accent); }
  .diag-list { list-style: none; padding: 0; }
  .diag-list li { padding: 0.5rem 0;
    border-bottom: 1px solid var(--border); }
  .diag-list li:last-child { border: none; }
  .diag-list a { display: flex; gap: 1rem; align-items: baseline; }
  .diag-list .diag-name { flex: 1 1 auto; word-break: break-word; }
  .diag-list .diag-meta { color: var(--fg2); font-size: 0.78rem;
    flex: 0 0 auto; }
  .diag-cat { margin-top: 1rem; }
  .diag-cat:first-child { margin-top: 0; }
  .diag-cat-header { display: flex; align-items: baseline; gap: 0.6rem;
    cursor: pointer; padding: 0.4rem 0; user-select: none;
    border-bottom: 1px solid var(--border); }
  .diag-cat-header:hover { color: var(--accent); }
  .diag-cat-header .diag-cat-toggle { color: var(--fg2);
    font-size: 0.75rem; width: 0.7rem; text-align: center; }
  .diag-cat-header .diag-cat-name { font-weight: 600; }
  .diag-cat-header .diag-cat-mtime { color: var(--fg2);
    font-size: 0.78rem; margin-left: auto; }
  .diag-cat-header .diag-cat-count { color: var(--fg2);
    font-size: 0.78rem; padding-left: 0.6rem; }
  .diag-viewer { text-align: center; }
  .diag-viewer img { max-width: 100%; height: auto;
    border: 1px solid var(--border); border-radius: 4px; }
  .diag-back { color: var(--fg2); font-size: 0.85rem; cursor: pointer;
    background: none; border: none; padding: 0; margin-bottom: 0.5rem; }
  .diag-back:hover { color: var(--accent); }
</style>
</head>
<body>

<!-- ============ AUTH GATE ============ -->
<div id="auth-gate">
  <h1>JacobianODE Reports</h1>
  <p style="color:var(--fg2); margin: 1rem 0 2rem;">Enter password to continue</p>
  <div>
    <input type="password" id="pw-input" placeholder="password"
           onkeydown="if(event.key==='Enter') checkAuth()">
    <button onclick="checkAuth()">→</button>
  </div>
  <div class="error" id="pw-error"></div>
</div>

<!-- Pull-to-refresh indicator (mobile) -->
<div id="pull-indicator">↓ pull to refresh</div>

<!-- ============ DASHBOARD ============ -->
<div id="dashboard">
  <h1>JacobianODE — Sweep Reports</h1>
  <div class="subtitle" id="last-updated"></div>

  <div class="status-bar" id="status-bar"></div>

  <div class="toolbar">
    <button onclick="openDiagnostics()" id="diag-btn">📊 diagnostics</button>
  </div>

  <h2>Active now</h2>
  <div id="active-now"></div>

  <h2>Reports by project</h2>
  <div id="projects"></div>

  <h2>Instruction queue</h2>
  <div id="queue"></div>

  <div class="refresh-note">Auto-refreshes every 60 s · <a href="#" onclick="loadDashboard();return false;">refresh now</a></div>
</div>

<!-- ============ DIAGNOSTICS MODAL ============ -->
<div id="diag-modal" onclick="if(event.target===this) closeDiagnostics()">
  <div class="diag-modal-inner" id="diag-modal-inner">
    <div class="diag-modal-header">
      <h3 id="diag-modal-title">Diagnostics</h3>
      <button class="diag-close" onclick="closeDiagnostics()">×</button>
    </div>
    <div id="diag-modal-body"></div>
  </div>
</div>

<script>
// --- Auth ---
// SHA-256 of the password. Generate a new one with:
//   echo -n "yourpassword" | sha256sum
// Then replace the hash below.
const PW_HASH = "13f601472ad526d93fac6a017d8f853b5c18d008adeb8dd618d04c42ebdd9ee4";

async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256",
    new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b =>
    b.toString(16).padStart(2, "0")).join("");
}

async function checkAuth() {
  const input = document.getElementById("pw-input").value;
  const hash = await sha256(input);
  if (hash === PW_HASH) {
    localStorage.setItem("jac_auth", "1");
    showDashboard();
  } else {
    document.getElementById("pw-error").textContent = "wrong password";
  }
}

function showDashboard() {
  document.getElementById("auth-gate").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadDashboard();
}

if (localStorage.getItem("jac_auth") === "1") {
  showDashboard();
}

// --- Diagnostics browser ---
// Modal that fetches manifest.json's ``diagnostics`` array (a list of
// images dropped into ``diagnostics/`` in the repo, enumerated by
// build_manifest.py). The list view shows name + mtime + size; clicking
// a row swaps the modal body for an inline image viewer with a "back to
// list" button. No state is persisted — the modal closes and re-fetches
// on every open so newly-pushed diagnostics show up without a reload.
async function openDiagnostics() {
  const modal = document.getElementById("diag-modal");
  const body = document.getElementById("diag-modal-body");
  const title = document.getElementById("diag-modal-title");
  title.textContent = "Diagnostics";
  body.innerHTML = '<div class="empty">Loading…</div>';
  modal.classList.add("open");
  let manifest;
  try {
    const r = await fetch("manifest.json?" + Date.now());
    manifest = await r.json();
  } catch (e) {
    body.innerHTML = '<div class="empty">Could not load manifest.json</div>';
    return;
  }
  const diags = manifest.diagnostics || [];
  if (!diags.length) {
    body.innerHTML = '<div class="empty">No diagnostic images yet. ' +
      'Drop a PNG into <code>diagnostics/</code> and re-run ' +
      '<code>build_manifest.py</code>.</div>';
    return;
  }
  // Group by category. Categories are ordered by their newest entry's
  // mtime (so the most-recently-updated category bubbles to the top).
  const byCat = new Map();
  for (const d of diags) {
    const cat = d.category || "uncategorized";
    if (!byCat.has(cat)) byCat.set(cat, []);
    byCat.get(cat).push(d);
  }
  const orderedCats = [...byCat.entries()]
    .map(([cat, items]) => ({
      cat,
      items: items.sort((a, b) => b.mtime - a.mtime),
      newest: Math.max(...items.map(i => i.mtime)),
    }))
    .sort((a, b) => b.newest - a.newest);

  const renderItem = (d) => {
    let ts = "?";
    try {
      ts = new Date(d.mtime * 1000).toLocaleString("en-US", {
        timeZone: "America/New_York",
        month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
      });
    } catch (e) {}
    const kb = (d.size / 1024).toFixed(0);
    const pathEnc = encodeURIComponent(d.path);
    return `<li><a href="#" onclick="viewDiagnostic(decodeURIComponent('${pathEnc}'));return false;">
      <span class="diag-name">${d.name}</span>
      <span class="diag-meta">${ts} ET · ${kb} KB</span>
    </a></li>`;
  };

  const sections = orderedCats.map((g, i) => {
    const id = `diag-cat-${i}`;
    let newest = "?";
    try {
      newest = new Date(g.newest * 1000).toLocaleString("en-US", {
        timeZone: "America/New_York",
        month: "short", day: "numeric",
        hour: "numeric", minute: "2-digit",
      });
    } catch (e) {}
    // Default to COLLAPSED (display:none + ▶); user toggles open.
    return `<section class="diag-cat">
      <div class="diag-cat-header" onclick="toggleDiagCat('${id}')">
        <span class="diag-cat-toggle" id="${id}-tog">▶</span>
        <span class="diag-cat-name">${g.cat}</span>
        <span class="diag-cat-mtime">${newest} ET</span>
        <span class="diag-cat-count">${g.items.length}</span>
      </div>
      <ul class="diag-list" id="${id}" style="display:none">${g.items.map(renderItem).join("")}</ul>
    </section>`;
  });
  body.innerHTML = sections.join("");
}

function toggleDiagCat(id) {
  const list = document.getElementById(id);
  const tog = document.getElementById(id + "-tog");
  if (!list || !tog) return;
  if (list.style.display === "none") {
    list.style.display = ""; tog.textContent = "▼";
  } else {
    list.style.display = "none"; tog.textContent = "▶";
  }
}

async function viewDiagnostic(pathOrName) {
  // Fetch fresh manifest so file metadata stays in sync with the index list.
  let manifest;
  try {
    const r = await fetch("manifest.json?" + Date.now());
    manifest = await r.json();
  } catch (e) { manifest = { diagnostics: [] }; }
  // Prefer match-by-path (unambiguous when same name lives in multiple
  // categories); fall back to match-by-name for legacy callers.
  const meta = (manifest.diagnostics || []).find(
    d => d.path === pathOrName || d.name === pathOrName
  );
  if (!meta) {
    document.getElementById("diag-modal-body").innerHTML =
      '<div class="empty">Image not in manifest. ' +
      '<a href="#" onclick="openDiagnostics();return false;">back</a></div>';
    return;
  }
  document.getElementById("diag-modal-title").textContent = meta.name;
  // Append a cache-buster so re-uploaded images don't get served stale.
  document.getElementById("diag-modal-body").innerHTML = `
    <button class="diag-back" onclick="openDiagnostics()">← back to list</button>
    <div class="diag-viewer">
      <img src="${meta.path}?${meta.mtime}" alt="${meta.name}">
    </div>
    <div style="margin-top: 0.8rem; color: var(--fg2); font-size: 0.78rem;">
      direct link:
      <a href="${meta.path}" target="_blank">${meta.path}</a>
    </div>`;
}

function closeDiagnostics() {
  document.getElementById("diag-modal").classList.remove("open");
}

// Esc closes modal
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDiagnostics();
});

// --- Hidden groups (per-browser, via localStorage) ---
// Minimizes clutter on a dashboard with dozens of processed sweeps. Each
// card gets a subtle × to hide that group; every project renders its
// hidden groups in a collapsible <details> dropdown at the bottom so
// they can be unhidden later. The ``Active now`` section also respects
// this list — a hidden group stays hidden wherever it appears until the
// user explicitly brings it back via the project-level dropdown.
function getHidden() {
  try {
    return new Set(JSON.parse(localStorage.getItem("jac_hidden_groups") || "[]"));
  } catch (e) { return new Set(); }
}
function saveHidden(set) {
  localStorage.setItem("jac_hidden_groups", JSON.stringify([...set]));
}
function hideGroup(group) {
  const h = getHidden(); h.add(group); saveHidden(h); loadDashboard();
}
function unhideGroup(group) {
  const h = getHidden(); h.delete(group); saveHidden(h); loadDashboard();
}

// --- Dashboard ---
async function loadDashboard() {
  // 1. Load overview.json
  let overview = null;
  try {
    const r = await fetch("status/overview.json?" + Date.now());
    overview = await r.json();
  } catch (e) { console.warn("overview.json not available:", e); }

  if (overview) {
    const utc = overview.last_updated;
    let eastern = "—";
    if (utc) {
      try {
        eastern = new Date(utc).toLocaleString("en-US", {
          timeZone: "America/New_York",
          dateStyle: "medium", timeStyle: "short",
        });
      } catch (e) { eastern = utc; }
    }
    document.getElementById("last-updated").textContent =
      "Last controller cycle: " + eastern + " ET";

    // Status bar
    const sweeps = overview.sweeps || {};
    const counts = { active: 0, done: 0, processed: 0, failed: 0 };
    for (const s of Object.values(sweeps)) counts[s.status] = (counts[s.status] || 0) + 1;
    const total = Object.keys(sweeps).length;
    document.getElementById("status-bar").innerHTML =
      `<div class="stat"><div class="num">${total}</div>total sweeps</div>` +
      `<div class="stat"><div class="num" style="color:var(--yellow)">${counts.active}</div>active</div>` +
      `<div class="stat"><div class="num" style="color:var(--green)">${counts.processed}</div>processed</div>` +
      `<div class="stat"><div class="num" style="color:var(--accent)">${counts.done}</div>awaiting analysis</div>` +
      `<div class="stat"><div class="num" style="color:var(--red)">${counts.failed}</div>failed</div>`;
  }

  // 2. Discover reports by scanning known project dirs.
  //    We fetch the GitHub API to list directories, or fall back to a
  //    pre-built manifest. For simplicity: scan overview sweeps for their
  //    projects and build links.
  const projectMap = {};  // project -> [{group, status, report_exists, runs_summary}]

  if (overview) {
    for (const [group, info] of Object.entries(overview.sweeps || {})) {
      // Try to find the report by checking common project prefixes
      // We don't know the project name from overview alone, so we'll
      // discover it from the filesystem via a manifest.
      if (!projectMap["_from_overview"]) projectMap["_from_overview"] = [];
      projectMap["_from_overview"].push({ group, ...info });
    }
  }

  // 3. Load manifest (generated by build script, or we build it live)
  let manifest = null;
  try {
    const r = await fetch("manifest.json?" + Date.now());
    manifest = await r.json();
  } catch (e) { /* no manifest yet */ }

  // --- Unified rendering: merge manifest + overview, inline SLURM info ---
  function renderCard(group, project, oInfo, hasReport, reportMtime, isHidden = false) {
    const status = oInfo?.status || "unknown";
    const summary = oInfo?.runs_summary;
    const tSlurm = oInfo?.training_slurm;
    const aSlurm = oInfo?.analysis_slurm;
    const badgeClass = {
      active: "badge-active", processed: "badge-processed",
      done: "badge-done", failed: "badge-failed"
    }[status] || "";

    let meta = [];
    if (reportMtime) {
      let ts;
      try {
        ts = new Date(reportMtime * 1000).toLocaleString("en-US", {
          timeZone: "America/New_York",
          month: "short", day: "numeric",
          hour: "numeric", minute: "2-digit",
        });
      } catch (e) { ts = "?"; }
      meta.push(`<span title="report generated">${ts} ET</span>`);
    }
    if (summary) {
      meta.push(`${summary.terminal || 0} terminal · ${summary.in_flight || 0} in-flight`);
    }
    if (tSlurm && tSlurm.n_total > 0) {
      meta.push(`<span style="color:var(--green)">${tSlurm.n_running || 0} running</span> · <span style="color:var(--fg2)">${tSlurm.n_pending || 0} queued</span>`);
    }
    if (aSlurm && (aSlurm.n_running > 0 || aSlurm.n_pending > 0)) {
      meta.push(`<span style="color:var(--accent)">analyzing</span>`);
    }

    const reportLink = hasReport && project
      ? `<a href="${project}/${group}/report.html">view report</a>`
      : `<span style="color:var(--fg2)">no report yet</span>`;

    // Group names come from the repo's own manifest / overview, so no
    // sanitiser. encodeURIComponent guards against any backslashes or
    // quotes if they ever appear.
    const gEnc = encodeURIComponent(group);
    const toggleBtn = isHidden
      ? `<button class="hide-btn" title="unhide" onclick="unhideGroup(decodeURIComponent('${gEnc}'))">↩ unhide</button>`
      : `<button class="hide-btn" title="hide this group" onclick="hideGroup(decodeURIComponent('${gEnc}'))">×</button>`;

    return `
      <div class="sweep-card">
        <div class="sweep-name-row">
          <span class="sweep-name">${group}</span>
          ${toggleBtn}
        </div>
        <div class="sweep-meta">
          ${meta.map(s => `<span>${s}</span>`).join("")}
          <span class="badge ${badgeClass}">${status}</span>
          ${reportLink}
        </div>
      </div>`;
  }

  // --- "Active now" section: aggregate any non-processed group (active /
  //     done / failed) across projects so they're visible at a glance.
  //     Groups shown here are hidden from the per-project list below
  //     (each group appears once). The per-card badge still distinguishes
  //     between active, done (awaiting analysis), and failed.
  //     Respects the per-user hidden-groups list — hidden-and-active
  //     groups reappear in the per-project "Show hidden" dropdown.
  const hidden = getHidden();
  const activeDiv = document.getElementById("active-now");
  const activeGroups = [];
  const activeGroupNames = new Set();
  const allManifestGroups = new Set();
  const isInProgress = info => info && info.status && info.status !== "processed";
  if (manifest && manifest.projects) {
    for (const [project, groups] of Object.entries(manifest.projects)) {
      for (const g of groups) {
        allManifestGroups.add(g.group);
        const info = overview?.sweeps?.[g.group];
        if (isInProgress(info)) {
          activeGroups.push({ ...g, project });
          activeGroupNames.add(g.group);
        }
      }
    }
  }
  if (overview) {
    for (const [group, info] of Object.entries(overview.sweeps || {})) {
      if (isInProgress(info) && !allManifestGroups.has(group)) {
        activeGroups.push({
          group, project: null, has_report: false, report_mtime: null,
        });
        activeGroupNames.add(group);
      }
    }
  }
  // Sort: groups with no report (fresh sweeps, most recently submitted) on
  // top; then extended/reprocessed groups by report_mtime descending.
  activeGroups.sort((a, b) => {
    if (!a.report_mtime && !b.report_mtime) return 0;
    if (!a.report_mtime) return -1;
    if (!b.report_mtime) return 1;
    return b.report_mtime - a.report_mtime;
  });
  const visibleActive = activeGroups.filter(g => !hidden.has(g.group));
  if (visibleActive.length > 0) {
    const list = document.createElement("div");
    list.className = "sweep-list";
    for (const g of visibleActive) {
      list.innerHTML += renderCard(
        g.group, g.project, overview?.sweeps?.[g.group],
        g.has_report, g.report_mtime
      );
    }
    activeDiv.innerHTML = "";
    activeDiv.appendChild(list);
  } else {
    activeDiv.innerHTML = '<div class="empty">Nothing in progress</div>';
  }

  // --- "Reports by project" section: processed groups (active ones shown
  //     above in Active now, skipped here to avoid duplication). Projects
  //     are ordered by the most-recent report_mtime across their
  //     non-active groups, so the project with fresh analysis sits on top.
  //     Within each project, hidden groups collapse into a <details>
  //     dropdown at the bottom so they can still be audited / unhidden.
  const projectsDiv = document.getElementById("projects");
  function renderHiddenDetails(projectGroups, project) {
    // Render hidden groups for a project as a collapsible block. Returns
    // an HTMLElement (or null if no hidden groups).
    const hiddenGroups = projectGroups.filter(g => hidden.has(g.group));
    if (hiddenGroups.length === 0) return null;
    const details = document.createElement("details");
    details.className = "hidden-details";
    details.innerHTML = `<summary>${hiddenGroups.length} hidden — click to show</summary>` +
      `<div class="sweep-list"></div>`;
    const list = details.querySelector(".sweep-list");
    for (const g of hiddenGroups) {
      list.innerHTML += renderCard(
        g.group, project, overview?.sweeps?.[g.group],
        g.has_report, g.report_mtime, /*isHidden=*/true
      );
    }
    return details;
  }
  if (manifest && manifest.projects) {
    projectsDiv.innerHTML = "";
    const projectEntries = Object.entries(manifest.projects)
      .map(([project, groups]) => {
        // All this project's groups that aren't shown in Active-now.
        const nonActive = groups.filter(g => !activeGroupNames.has(g.group));
        const visible = nonActive.filter(g => !hidden.has(g.group));
        const maxMtime = visible.reduce(
          (acc, g) => Math.max(acc, g.report_mtime || 0), 0
        );
        return { project, nonActive, visible, maxMtime };
      })
      .filter(entry =>
        entry.visible.length > 0
        || entry.nonActive.some(g => hidden.has(g.group))
      )
      .sort((a, b) => b.maxMtime - a.maxMtime);
    for (const { project, nonActive, visible } of projectEntries) {
      const div = document.createElement("div");
      div.className = "project";
      div.innerHTML = `<div class="project-name">${project}</div><div class="sweep-list"></div>`;
      const list = div.querySelector(".sweep-list");
      for (const g of visible) {
        list.innerHTML += renderCard(
          g.group, project, overview?.sweeps?.[g.group],
          g.has_report, g.report_mtime
        );
      }
      const hiddenBlock = renderHiddenDetails(nonActive, project);
      if (hiddenBlock) div.appendChild(hiddenBlock);
      projectsDiv.appendChild(div);
    }
  } else if (overview) {
    projectsDiv.innerHTML = '<div class="empty">No manifest.json — flat list from overview</div>';
    const list = document.createElement("div");
    list.className = "sweep-list";
    for (const [group, info] of Object.entries(overview.sweeps || {})) {
      if (activeGroupNames.has(group)) continue;
      if (hidden.has(group)) continue;
      list.innerHTML += renderCard(group, null, info, false);
    }
    projectsDiv.appendChild(list);
  } else {
    projectsDiv.innerHTML = '<div class="empty">No status data available</div>';
  }

  // 4. Queue — only show instructions actually still waiting to be claimed.
  //    Claimed entries never leave instructions/claimed/, so showing them
  //    would just grow the list forever with historical records that are
  //    already reflected in the per-group cards above.
  const queueDiv = document.getElementById("queue");
  const pendingInstr = (overview?.pending_instructions || [])
    .filter(q => q.status === "pending");
  if (pendingInstr.length > 0) {
    queueDiv.innerHTML = pendingInstr.map(q =>
      `<div class="queue-item"><span class="badge badge-active">pending</span> ${q.file}</div>`
    ).join("");
  } else {
    queueDiv.innerHTML = '<div class="empty">No pending instructions</div>';
  }
}

// Auto-refresh
setInterval(loadDashboard, 60000);

// --- Pull-to-refresh (mobile) -----------------------------------------------
// Only activates when the user touches near the top of the page (scrollY===0)
// and drags down. Past the threshold, releasing triggers loadDashboard().
(function() {
  const indicator = document.getElementById("pull-indicator");
  if (!indicator) return;
  const H = 50;            // indicator height in px
  const THRESHOLD = 80;    // drag distance to commit a refresh
  let startY = null;
  let currentPull = 0;

  const hide = () => {
    indicator.style.transition = "transform 0.3s ease-out";
    indicator.style.transform = "translateY(-100%)";
    indicator.classList.remove("refreshing");
    currentPull = 0;
  };

  document.addEventListener("touchstart", (e) => {
    if (window.scrollY <= 0 && e.touches.length === 1) {
      startY = e.touches[0].clientY;
      currentPull = 0;
    } else {
      startY = null;
    }
  }, { passive: true });

  document.addEventListener("touchmove", (e) => {
    if (startY === null) return;
    const delta = e.touches[0].clientY - startY;
    if (delta <= 0 || window.scrollY > 0) {
      startY = null;
      if (currentPull > 0) hide();
      return;
    }
    currentPull = delta;
    // Ease the pull — 1:1 under threshold, half-speed past it, so it doesn't
    // feel infinite when the user keeps dragging.
    const eased = delta <= THRESHOLD
      ? delta
      : THRESHOLD + (delta - THRESHOLD) * 0.4;
    const y = Math.min(eased, H * 2);
    indicator.style.transition = "none";
    indicator.style.transform = `translateY(${y - H}px)`;
    indicator.textContent = delta >= THRESHOLD
      ? "↻ release to refresh"
      : "↓ pull to refresh";
  }, { passive: true });

  const onEnd = async () => {
    if (startY === null) return;
    const commit = currentPull >= THRESHOLD;
    startY = null;
    if (!commit) {
      hide();
      return;
    }
    indicator.textContent = "↻ refreshing…";
    indicator.classList.add("refreshing");
    indicator.style.transition = "transform 0.2s ease-out";
    indicator.style.transform = "translateY(0)";
    try {
      await loadDashboard();
    } catch (e) {
      console.warn("pull refresh failed:", e);
    }
    // Brief hold on "refreshing" so the user registers the feedback, then hide.
    setTimeout(hide, 400);
  };
  document.addEventListener("touchend", onEnd);
  document.addEventListener("touchcancel", onEnd);
})();
</script>
</body>
